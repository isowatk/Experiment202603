<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>実験説明</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 40px auto; line-height: 1.8; padding: 0 16px; }
    .box { border: 1px solid #ccc; padding: 24px; border-radius: 12px; }
    button { font-size: 18px; padding: 12px 20px; }
  </style>
</head>
<body>
  <div class="box">
    <h1>実験の説明</h1>
    <p>この実験では画面上でいくつかの指示に従ってタスクを行っていただき、アンケートにもお答えいただきます。所要時間は15-20分です。</p>
    <p>ページ遷移時に緑のメニューボックスが表示されます。少し待つと"OK"ボタンが表示されるので押下して開始してください。</p>
    <p>また、開始時に音声テストがありますので、音声が聞こえる静かな環境で実施してください。</p>
    <label>
      <input type="checkbox" id="agree">
      参加に同意
    </label>
    <br><br>
    <button id="start" disabled>実験を開始</button>
  </div>

  <script>
    const agree = document.getElementById('agree');
    const start = document.getElementById('start');
    agree.addEventListener('change', () => {
      start.disabled = !agree.checked;
    });
    start.addEventListener('click', () => {
      window.location.href = "https://run.pavlovia.org/Isowa/pre_experiment/?__pilotToken=9bf31c7ff062936a96d3c8bd1f8f2ff3&__oauthToken=fe4d194dbe8b7d12367823e6b1980596db63dc4193a03efb1aec961e9dcd7ad4";
    });
  </script>
</body>
</html>
